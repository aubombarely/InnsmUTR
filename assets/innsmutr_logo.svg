<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#081a1f"/>
      <stop offset="100%" stop-color="#040c10"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="196" fill="#030a0d"/>
  <circle cx="200" cy="200" r="185" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="192" fill="none" stroke="#0e3040" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="186" fill="none" stroke="#081e28" stroke-width="0.6"/>

  <!-- Stars (aqua-tinted) -->
  <g fill="#88ddee" opacity="0.40">
    <circle cx="68"  cy="82"  r="1"/>
    <circle cx="335" cy="68"  r="1.5"/>
    <circle cx="82"  cy="318" r="1"/>
    <circle cx="350" cy="310" r="1.5"/>
    <circle cx="112" cy="358" r="1"/>
    <circle cx="294" cy="363" r="1"/>
    <circle cx="52"  cy="208" r="1"/>
    <circle cx="373" cy="178" r="1"/>
    <circle cx="314" cy="46"  r="1"/>
    <circle cx="150" cy="41"  r="1.5"/>
    <circle cx="40"  cy="148" r="1"/>
    <circle cx="362" cy="248" r="1"/>
  </g>

  <!-- ── Deep One / fish silhouette (Innsmouth theme) at top ───────── -->
  <!-- Stylised fish head pointing right, with gill arcs and large eye -->
  <!-- Body oval -->
  <ellipse cx="200" cy="75" rx="45" ry="22"
           fill="#0e2a35" stroke="#1e6878" stroke-width="1.5"
           filter="url(#glow)" opacity="0.90"/>
  <!-- Tail fin -->
  <path d="M 245,75 C 260,62 272,58 270,75 C 268,92 258,90 245,75 Z"
        fill="#0e2a35" stroke="#1e6878" stroke-width="1.2" opacity="0.80"/>
  <!-- Dorsal fin -->
  <path d="M 210,53 C 215,42 228,38 230,48 C 232,55 225,58 210,58 Z"
        fill="#0e2a35" stroke="#1e6878" stroke-width="1" opacity="0.70"/>
  <!-- Gill arcs -->
  <path d="M 185,60 C 180,68 180,82 185,90"
        fill="none" stroke="#2a8898" stroke-width="1.3" opacity="0.70"/>
  <path d="M 178,63 C 172,72 172,80 178,88"
        fill="none" stroke="#2a8898" stroke-width="1" opacity="0.55"/>
  <!-- Eye (large, deep-water) -->
  <circle cx="168" cy="72" r="10" fill="#051518" stroke="#2a9aaa" stroke-width="1.3"
          filter="url(#glow)" opacity="0.92"/>
  <circle cx="168" cy="72" r="5"  fill="#082028"/>
  <circle cx="168" cy="72" r="2.5" fill="#44ddee" filter="url(#glow)" opacity="0.90"/>
  <circle cx="166" cy="70" r="1"  fill="#ffffff" opacity="0.65"/>
  <!-- Scale pattern (small overlapping arcs) -->
  <g stroke="#1e5a6a" stroke-width="0.7" fill="none" opacity="0.50">
    <path d="M 200,62 Q 208,68 200,74"/>
    <path d="M 210,62 Q 218,68 210,74"/>
    <path d="M 220,64 Q 228,70 220,76"/>
    <path d="M 205,72 Q 213,78 205,84"/>
    <path d="M 215,72 Q 223,78 215,84"/>
  </g>

  <!-- ── Gene model diagram (5'UTR — CDS — 3'UTR) ──────────────────── -->
  <!-- Intron lines (thin baseline) -->
  <line x1="118" y1="165" x2="282" y2="165"
        stroke="#1e5060" stroke-width="1.5" opacity="0.60"/>

  <!-- 5' UTR -->
  <rect x="118" y="155" width="42" height="20" rx="3"
        fill="#1a5878" stroke="#2a9aaa" stroke-width="1.3"
        filter="url(#glow)" opacity="0.88"/>
  <text x="139" y="169" font-family="'Courier New',monospace" font-size="9"
        fill="#88ddee" text-anchor="middle" font-weight="bold">5'</text>

  <!-- CDS (taller, dominant) -->
  <rect x="164" y="147" width="72" height="36" rx="3"
        fill="#0e3a4a" stroke="#2ec8a6" stroke-width="1.6"
        filter="url(#glow)" opacity="0.90"/>
  <text x="200" y="169" font-family="'Courier New',monospace" font-size="9"
        fill="#2ec8a6" text-anchor="middle" font-weight="bold">CDS</text>

  <!-- 3' UTR -->
  <rect x="240" y="155" width="42" height="20" rx="3"
        fill="#1a5878" stroke="#2a9aaa" stroke-width="1.3"
        filter="url(#glow)" opacity="0.88"/>
  <text x="261" y="169" font-family="'Courier New',monospace" font-size="9"
        fill="#88ddee" text-anchor="middle" font-weight="bold">3'</text>

  <!-- Target annotation (second track, slightly below) -->
  <line x1="118" y1="198" x2="282" y2="198"
        stroke="#1e5060" stroke-width="1.5" opacity="0.40"/>
  <rect x="118" y="189" width="35" height="18" rx="3"
        fill="#102030" stroke="#2a7a8a" stroke-width="1" opacity="0.75"/>
  <text x="135" y="202" font-family="'Courier New',monospace" font-size="8"
        fill="#5aacbc" text-anchor="middle">5'</text>
  <rect x="164" y="183" width="72" height="30" rx="3"
        fill="#0a2535" stroke="#1e8878" stroke-width="1" opacity="0.75"/>
  <text x="200" y="202" font-family="'Courier New',monospace" font-size="8"
        fill="#1e9988" text-anchor="middle">CDS</text>
  <rect x="248" y="189" width="34" height="18" rx="3"
        fill="#102030" stroke="#2a7a8a" stroke-width="1" opacity="0.75"/>
  <text x="265" y="202" font-family="'Courier New',monospace" font-size="8"
        fill="#5aacbc" text-anchor="middle">3'</text>

  <!-- Track labels -->
  <text x="113" y="168" font-family="'Courier New',monospace" font-size="7"
        fill="#2a8898" text-anchor="end">ref</text>
  <text x="113" y="200" font-family="'Courier New',monospace" font-size="7"
        fill="#1a6878" text-anchor="end">tgt</text>

  <!-- ── Benchmarking confusion matrix (TP/FP/FN/TN) ───────────────── -->
  <!-- 2×2 grid centered below gene model -->
  <g transform="translate(148, 220)">
    <!-- TP (green) -->
    <rect x="0"  y="0"  width="38" height="25" rx="2"
          fill="#0a3028" stroke="#2ec8a6" stroke-width="1.1" opacity="0.85"/>
    <text x="19" y="16" font-family="'Courier New',monospace" font-size="8.5"
          fill="#2ec8a6" text-anchor="middle" font-weight="bold">TP</text>
    <!-- FP (amber) -->
    <rect x="42" y="0"  width="38" height="25" rx="2"
          fill="#2a2008" stroke="#c8a83a" stroke-width="1.1" opacity="0.80"/>
    <text x="61" y="16" font-family="'Courier New',monospace" font-size="8.5"
          fill="#c8a83a" text-anchor="middle">FP</text>
    <!-- FN (red) -->
    <rect x="0"  y="29" width="38" height="25" rx="2"
          fill="#280a0a" stroke="#cc4444" stroke-width="1.1" opacity="0.78"/>
    <text x="19" y="45" font-family="'Courier New',monospace" font-size="8.5"
          fill="#cc4444" text-anchor="middle">FN</text>
    <!-- TN (muted) -->
    <rect x="42" y="29" width="38" height="25" rx="2"
          fill="#181818" stroke="#445566" stroke-width="1.1" opacity="0.65"/>
    <text x="61" y="45" font-family="'Courier New',monospace" font-size="8.5"
          fill="#445566" text-anchor="middle">TN</text>

    <!-- Axis labels -->
    <text x="19" y="-5"  font-family="'Courier New',monospace" font-size="7"
          fill="#2a7a8a" text-anchor="middle">ref+</text>
    <text x="61" y="-5"  font-family="'Courier New',monospace" font-size="7"
          fill="#2a7a8a" text-anchor="middle">ref-</text>
    <text x="-4" y="16"  font-family="'Courier New',monospace" font-size="7"
          fill="#2a7a8a" text-anchor="end">tgt+</text>
    <text x="-4" y="45"  font-family="'Courier New',monospace" font-size="7"
          fill="#2a7a8a" text-anchor="end">tgt-</text>
  </g>

  <!-- Separator -->
  <line x1="105" y1="295" x2="295" y2="295" stroke="#0e3040" stroke-width="0.8"/>

  <!-- Title -->
  <text x="200" y="320"
        font-family="'Courier New',Courier,monospace"
        font-size="27" font-weight="bold"
        fill="#c8f0f8" text-anchor="middle" letter-spacing="1.5"
        filter="url(#textglow)">InnsmUTR</text>

  <text x="200" y="342"
        font-family="'Courier New',Courier,monospace"
        font-size="9.5" fill="#2a6878"
        text-anchor="middle" letter-spacing="1.2">UTR  ·  Annotation  ·  Benchmark</text>

</svg>
